<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Research & discovery — animated stat rings</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#EAECF0;padding:28px;font-family:"Segoe UI",-apple-system,system-ui,sans-serif;-webkit-font-smoothing:antialiased;display:flex;justify-content:center}
@keyframes dotGo{0%{transform:translateX(0);opacity:0}12%{opacity:1}88%{opacity:1}100%{transform:translateX(52px);opacity:0}}
@keyframes leakGo{0%{transform:translate(0,0);opacity:0}12%{opacity:1}55%{transform:translate(26px,0);opacity:1}100%{transform:translate(32px,26px);opacity:0}}
@keyframes dashDrift{to{stroke-dashoffset:-16}}
@keyframes blinkLine{0%,100%{opacity:.75}50%{opacity:.12}}
@keyframes pulseChip{0%,100%{box-shadow:0 0 0 0 rgba(122,111,240,.45)}50%{box-shadow:0 0 0 7px rgba(122,111,240,0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes growW{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes drawLine{to{stroke-dashoffset:0}}
@keyframes areaIn{from{opacity:0}to{opacity:1}}
@keyframes tokenGo{0%,5%{transform:translateX(0)}22%,27%{transform:translateX(268px)}44%,49%{transform:translateX(536px)}66%,71%{transform:translateX(804px)}88%,100%{transform:translateX(1072px)}}
@keyframes stageGlow{0%{transform:translateY(0);box-shadow:0 1px 2px rgba(0,0,0,.05)}4%{transform:translateY(-4px);box-shadow:0 6px 18px rgba(122,111,240,.35)}16%{transform:translateY(0);box-shadow:0 1px 2px rgba(0,0,0,.05)}100%{transform:translateY(0);box-shadow:0 1px 2px rgba(0,0,0,.05)}}
@keyframes outShow{0%{opacity:0;transform:translateY(6px)}4%{opacity:0;transform:translateY(6px)}9%{opacity:1;transform:translateY(0)}92%{opacity:1}100%{opacity:0}}
@keyframes cyc5{0%{opacity:0;visibility:hidden}1%{opacity:0;visibility:visible}4%{opacity:1}19%{opacity:1}21%{opacity:0;visibility:hidden}100%{opacity:0;visibility:hidden}}
@keyframes navCyc{0%{opacity:0}2%{opacity:1}19%{opacity:1}21%{opacity:0}100%{opacity:0}}
@keyframes ringFill{from{stroke-dashoffset:264}to{stroke-dashoffset:var(--off)}}
@keyframes popIn{0%{opacity:0;transform:scale(.6)}70%{opacity:1;transform:scale(1.07)}100%{opacity:1;transform:scale(1)}}
@keyframes frictionPulse{0%,100%{box-shadow:0 0 0 0 rgba(209,52,56,.35)}50%{box-shadow:0 0 0 9px rgba(209,52,56,0)}}
@keyframes boltIn{from{opacity:0;transform:translateY(12px) scale(.85)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes futureGo{0%,4%{transform:translateX(0)}22%,26%{transform:translateX(258px)}44%,48%{transform:translateX(516px)}66%,70%{transform:translateX(774px)}88%,100%{transform:translateX(1032px)}}
@keyframes dashDriftV{to{stroke-dashoffset:-14}}
@keyframes flowGlow{0%,100%{opacity:.35}50%{opacity:1}}
@keyframes underlineGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes sparkle{0%,100%{transform:rotate(45deg) scale(1);opacity:1}50%{transform:rotate(45deg) scale(.72);opacity:.6}}
@keyframes checkIn{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div class="dv-card" style="width:1180px;padding:44px 48px 48px;background:linear-gradient(160deg,#fdfdfc,#f2f4fa)">
<div style="font-size:22px;font-weight:650;color:#1c1c30;margin-bottom:4px">Research across people, processes, and systems</div>
<div style="font-size:13px;color:#8a8886;margin-bottom:36px">interviews · journey mapping · systems analysis</div>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:22px">
<div style="background:#fff;border:1px solid #e7e5f0;border-radius:16px;padding:30px 24px;text-align:center;animation:fadeUp .6s ease both">
<svg height="120" style="margin:0 auto" viewbox="0 0 120 120" width="120">
<circle cx="60" cy="60" fill="none" r="50" stroke="#eef1f8" stroke-width="10"></circle>
<circle cx="60" cy="60" fill="none" r="50" stroke="#0f6cbd" stroke-dasharray="314" stroke-dashoffset="314" stroke-linecap="round" stroke-width="10" style="--off:63;animation:ringFill 1.5s cubic-bezier(.2,.7,.3,1) both .2s" transform="rotate(-90 60 60)"></circle>
<text fill="#0f6cbd" font-size="34" font-weight="700" text-anchor="middle" x="60" y="72">8</text>
</svg>
<div style="font-size:14px;font-weight:650;color:#242424;margin-top:14px">Stakeholders interviewed</div>
</div>
<div style="background:#fff;border:1px solid #e7e5f0;border-radius:16px;padding:30px 24px;text-align:center;animation:fadeUp .6s ease both .12s">
<svg height="120" style="margin:0 auto" viewbox="0 0 120 120" width="120">
<circle cx="60" cy="60" fill="none" r="50" stroke="#eef1f8" stroke-width="10"></circle>
<circle cx="60" cy="60" fill="none" r="50" stroke="#5a94d6" stroke-dasharray="314" stroke-dashoffset="314" stroke-linecap="round" stroke-width="10" style="--off:157;animation:ringFill 1.5s cubic-bezier(.2,.7,.3,1) both .35s" transform="rotate(-90 60 60)"></circle>
<text fill="#3a7bc0" font-size="34" font-weight="700" text-anchor="middle" x="60" y="72">4</text>
</svg>
<div style="font-size:14px;font-weight:650;color:#242424;margin-top:14px">Personas mapped</div>
</div>
<div style="background:#fff;border:1px solid #e7e5f0;border-radius:16px;padding:30px 24px;text-align:center;animation:fadeUp .6s ease both .24s">
<svg height="120" style="margin:0 auto" viewbox="0 0 120 120" width="120">
<circle cx="60" cy="60" fill="none" r="50" stroke="#eef1f8" stroke-width="10"></circle>
<circle cx="60" cy="60" fill="none" r="50" stroke="#9d93ff" stroke-dasharray="314" stroke-dashoffset="314" stroke-linecap="round" stroke-width="10" style="--off:196;animation:ringFill 1.5s cubic-bezier(.2,.7,.3,1) both .5s" transform="rotate(-90 60 60)"></circle>
<text fill="#7a6ff0" font-size="34" font-weight="700" text-anchor="middle" x="60" y="72">3</text>
</svg>
<div style="font-size:14px;font-weight:650;color:#242424;margin-top:14px">Organizations represented</div>
</div>
<div style="background:#fff;border:1px solid #e7e5f0;border-radius:16px;padding:30px 24px;text-align:center;animation:fadeUp .6s ease both .36s">
<svg height="120" style="margin:0 auto" viewbox="0 0 120 120" width="120">
<circle cx="60" cy="60" fill="none" r="50" stroke="#eef1f8" stroke-width="10"></circle>
<circle cx="60" cy="60" fill="none" r="50" stroke="#4c43b3" stroke-dasharray="314" stroke-dashoffset="314" stroke-linecap="round" stroke-width="10" style="--off:118;animation:ringFill 1.5s cubic-bezier(.2,.7,.3,1) both .65s" transform="rotate(-90 60 60)"></circle>
<text fill="#4c43b3" font-size="34" font-weight="700" text-anchor="middle" x="60" y="72">5</text>
</svg>
<div style="font-size:14px;font-weight:650;color:#242424;margin-top:14px">Systems &amp; tools analyzed</div>
</div>
</div>
</div>
<script>
  document.querySelectorAll('[data-hover]').forEach(function(el){
    var base = el.getAttribute('style') || '';
    var hover = el.getAttribute('data-hover');
    el.addEventListener('mouseenter', function(){ el.setAttribute('style', base + ';' + hover); });
    el.addEventListener('mouseleave', function(){ el.setAttribute('style', base); });
  });
</script>
</body>
</html>
