<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>"Connected by people, not by a system" — network view</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#EAECF0;padding:28px;font-family:"Segoe UI",-apple-system,system-ui,sans-serif;-webkit-font-smoothing:antialiased;display:flex;justify-content:center}
@keyframes dotGo{0%{transform:translateX(0);opacity:0}12%{opacity:1}88%{opacity:1}100%{transform:translateX(52px);opacity:0}}
@keyframes leakGo{0%{transform:translate(0,0);opacity:0}12%{opacity:1}55%{transform:translate(26px,0);opacity:1}100%{transform:translate(32px,26px);opacity:0}}
@keyframes dashDrift{to{stroke-dashoffset:-16}}
@keyframes blinkLine{0%,100%{opacity:.75}50%{opacity:.12}}
@keyframes pulseChip{0%,100%{box-shadow:0 0 0 0 rgba(122,111,240,.45)}50%{box-shadow:0 0 0 7px rgba(122,111,240,0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes growW{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes drawLine{to{stroke-dashoffset:0}}
@keyframes areaIn{from{opacity:0}to{opacity:1}}
@keyframes tokenGo{0%,5%{transform:translateX(0)}22%,27%{transform:translateX(268px)}44%,49%{transform:translateX(536px)}66%,71%{transform:translateX(804px)}88%,100%{transform:translateX(1072px)}}
@keyframes stageGlow{0%{transform:translateY(0);box-shadow:0 1px 2px rgba(0,0,0,.05)}4%{transform:translateY(-4px);box-shadow:0 6px 18px rgba(122,111,240,.35)}16%{transform:translateY(0);box-shadow:0 1px 2px rgba(0,0,0,.05)}100%{transform:translateY(0);box-shadow:0 1px 2px rgba(0,0,0,.05)}}
@keyframes outShow{0%{opacity:0;transform:translateY(6px)}4%{opacity:0;transform:translateY(6px)}9%{opacity:1;transform:translateY(0)}92%{opacity:1}100%{opacity:0}}
@keyframes cyc5{0%{opacity:0;visibility:hidden}1%{opacity:0;visibility:visible}4%{opacity:1}19%{opacity:1}21%{opacity:0;visibility:hidden}100%{opacity:0;visibility:hidden}}
@keyframes navCyc{0%{opacity:0}2%{opacity:1}19%{opacity:1}21%{opacity:0}100%{opacity:0}}
@keyframes ringFill{from{stroke-dashoffset:264}to{stroke-dashoffset:var(--off)}}
@keyframes popIn{0%{opacity:0;transform:scale(.6)}70%{opacity:1;transform:scale(1.07)}100%{opacity:1;transform:scale(1)}}
@keyframes frictionPulse{0%,100%{box-shadow:0 0 0 0 rgba(209,52,56,.35)}50%{box-shadow:0 0 0 9px rgba(209,52,56,0)}}
@keyframes boltIn{from{opacity:0;transform:translateY(12px) scale(.85)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes futureGo{0%,4%{transform:translateX(0)}22%,26%{transform:translateX(258px)}44%,48%{transform:translateX(516px)}66%,70%{transform:translateX(774px)}88%,100%{transform:translateX(1032px)}}
@keyframes dashDriftV{to{stroke-dashoffset:-14}}
@keyframes flowGlow{0%,100%{opacity:.35}50%{opacity:1}}
@keyframes underlineGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes sparkle{0%,100%{transform:rotate(45deg) scale(1);opacity:1}50%{transform:rotate(45deg) scale(.72);opacity:.6}}
@keyframes checkIn{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div class="dv-card" style="width:1060px;padding:40px 40px 32px;background:#fbfaf8">
<div style="font-size:19px;font-weight:650;color:#242424;margin-bottom:6px">Feedback flowed through individuals</div>
<div style="font-size:12.5px;color:#8a8886;margin-bottom:8px">when people moved on, the connections broke with them</div>
<div style="position:relative;width:980px;height:330px">
<svg height="330" style="position:absolute;inset:0" viewbox="0 0 980 330" width="980">
<line stroke="#b9b7b4" stroke-dasharray="5 5" stroke-width="1.6" style="animation:dashDrift 1.2s linear infinite" x1="120" x2="300" y1="60" y2="165"></line>
<line stroke="#b9b7b4" stroke-dasharray="5 5" stroke-width="1.6" style="animation:dashDrift 1.4s linear infinite" x1="310" x2="300" y1="60" y2="165"></line>
<line stroke="#b9b7b4" stroke-dasharray="5 5" stroke-width="1.6" style="animation:dashDrift 1.1s linear infinite" x1="500" x2="490" y1="60" y2="165"></line>
<line stroke="#d13438" stroke-dasharray="5 5" stroke-width="1.6" style="animation:dashDrift 1.3s linear infinite,blinkLine 3.2s ease-in-out infinite" x1="690" x2="680" y1="60" y2="165"></line>
<line stroke="#b9b7b4" stroke-dasharray="5 5" stroke-width="1.6" style="animation:dashDrift 1.5s linear infinite" x1="870" x2="680" y1="60" y2="165"></line>
<line stroke="#b9b7b4" stroke-dasharray="5 5" stroke-width="1.6" style="animation:dashDrift 1.6s linear infinite" x1="310" x2="490" y1="60" y2="165"></line>
<line stroke="#d13438" stroke-dasharray="5 5" stroke-width="1.6" style="animation:dashDrift 1.2s linear infinite,blinkLine 4s ease-in-out infinite 1s" x1="500" x2="680" y1="60" y2="165"></line>
<line stroke="#b9b7b4" stroke-dasharray="5 5" stroke-width="1.6" style="animation:dashDrift 1.3s linear infinite" x1="300" x2="240" y1="195" y2="285"></line>
<line stroke="#b9b7b4" stroke-dasharray="5 5" stroke-width="1.6" style="animation:dashDrift 1.1s linear infinite" x1="490" x2="490" y1="195" y2="285"></line>
<line stroke="#d13438" stroke-dasharray="5 5" stroke-width="1.6" style="animation:dashDrift 1.4s linear infinite,blinkLine 3.6s ease-in-out infinite .5s" x1="680" x2="740" y1="195" y2="285"></line>
<line stroke="#b9b7b4" stroke-dasharray="5 5" stroke-width="1.6" style="animation:dashDrift 1.7s linear infinite" x1="300" x2="490" y1="195" y2="285"></line>
</svg>
<div style="position:absolute;top:44px;left:60px;width:120px;text-align:center;font-size:12px;font-weight:600;color:#605e5c;background:#fff;border:1px solid #e1dfdd;border-radius:8px;padding:8px 6px">Meeting notes</div>
<div style="position:absolute;top:44px;left:250px;width:120px;text-align:center;font-size:12px;font-weight:600;color:#605e5c;background:#fff;border:1px solid #e1dfdd;border-radius:8px;padding:8px 6px">Spreadsheets</div>
<div style="position:absolute;top:44px;left:440px;width:120px;text-align:center;font-size:12px;font-weight:600;color:#605e5c;background:#fff;border:1px solid #e1dfdd;border-radius:8px;padding:8px 6px">SharePoint</div>
<div style="position:absolute;top:44px;left:630px;width:120px;text-align:center;font-size:12px;font-weight:600;color:#605e5c;background:#fff;border:1px solid #e1dfdd;border-radius:8px;padding:8px 6px">Teams chats</div>

<div style="position:absolute;top:141px;left:456px;width:68px;height:48px;border-radius:50%;background:#deecf9;border:2px solid #9cc3e5;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:650;color:#0f548c">PM</div>
<div style="position:absolute;top:141px;left:646px;width:68px;height:48px;border-radius:50%;background:#fdf3f4;border:2px dashed #d13438;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:650;color:#a4262c">left team</div>
<div style="position:absolute;top:270px;left:170px;width:140px;text-align:center;font-size:12px;font-weight:600;color:#242424;background:#fff;border:1px solid #e1dfdd;border-radius:8px;padding:8px 6px">Product backlog</div>
<div style="position:absolute;top:270px;left:420px;width:140px;text-align:center;font-size:12px;font-weight:600;color:#242424;background:#fff;border:1px solid #e1dfdd;border-radius:8px;padding:8px 6px">Roadmap review</div>
<div style="position:absolute;top:270px;left:670px;width:140px;text-align:center;font-size:12px;font-weight:600;color:#a4262c;background:#fdf3f4;border:1px solid #f1c3c5;border-radius:8px;padding:8px 6px">OKR reporting</div>
</div>
</div>
<script>
  document.querySelectorAll('[data-hover]').forEach(function(el){
    var base = el.getAttribute('style') || '';
    var hover = el.getAttribute('data-hover');
    el.addEventListener('mouseenter', function(){ el.setAttribute('style', base + ';' + hover); });
    el.addEventListener('mouseleave', function(){ el.setAttribute('style', base); });
  });
</script>
</body>
</html>
