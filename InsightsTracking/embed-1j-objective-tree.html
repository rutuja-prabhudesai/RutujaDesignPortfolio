<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Objective tree — progress rings with AI-skill attribution</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#EAECF0;padding:28px;font-family:"Segoe UI",-apple-system,system-ui,sans-serif;-webkit-font-smoothing:antialiased;display:flex;justify-content:center}
@keyframes dotGo{0%{transform:translateX(0);opacity:0}12%{opacity:1}88%{opacity:1}100%{transform:translateX(52px);opacity:0}}
@keyframes leakGo{0%{transform:translate(0,0);opacity:0}12%{opacity:1}55%{transform:translate(26px,0);opacity:1}100%{transform:translate(32px,26px);opacity:0}}
@keyframes dashDrift{to{stroke-dashoffset:-16}}
@keyframes blinkLine{0%,100%{opacity:.75}50%{opacity:.12}}
@keyframes pulseChip{0%,100%{box-shadow:0 0 0 0 rgba(122,111,240,.45)}50%{box-shadow:0 0 0 7px rgba(122,111,240,0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes growW{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes drawLine{to{stroke-dashoffset:0}}
@keyframes areaIn{from{opacity:0}to{opacity:1}}
@keyframes tokenGo{0%,5%{transform:translateX(0)}22%,27%{transform:translateX(268px)}44%,49%{transform:translateX(536px)}66%,71%{transform:translateX(804px)}88%,100%{transform:translateX(1072px)}}
@keyframes stageGlow{0%{transform:translateY(0);box-shadow:0 1px 2px rgba(0,0,0,.05)}4%{transform:translateY(-4px);box-shadow:0 6px 18px rgba(122,111,240,.35)}16%{transform:translateY(0);box-shadow:0 1px 2px rgba(0,0,0,.05)}100%{transform:translateY(0);box-shadow:0 1px 2px rgba(0,0,0,.05)}}
@keyframes outShow{0%{opacity:0;transform:translateY(6px)}4%{opacity:0;transform:translateY(6px)}9%{opacity:1;transform:translateY(0)}92%{opacity:1}100%{opacity:0}}
@keyframes cyc5{0%{opacity:0;visibility:hidden}1%{opacity:0;visibility:visible}4%{opacity:1}19%{opacity:1}21%{opacity:0;visibility:hidden}100%{opacity:0;visibility:hidden}}
@keyframes navCyc{0%{opacity:0}2%{opacity:1}19%{opacity:1}21%{opacity:0}100%{opacity:0}}
@keyframes ringFill{from{stroke-dashoffset:264}to{stroke-dashoffset:var(--off)}}
@keyframes popIn{0%{opacity:0;transform:scale(.6)}70%{opacity:1;transform:scale(1.07)}100%{opacity:1;transform:scale(1)}}
@keyframes frictionPulse{0%,100%{box-shadow:0 0 0 0 rgba(209,52,56,.35)}50%{box-shadow:0 0 0 9px rgba(209,52,56,0)}}
@keyframes boltIn{from{opacity:0;transform:translateY(12px) scale(.85)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes futureGo{0%,4%{transform:translateX(0)}22%,26%{transform:translateX(258px)}44%,48%{transform:translateX(516px)}66%,70%{transform:translateX(774px)}88%,100%{transform:translateX(1032px)}}
@keyframes dashDriftV{to{stroke-dashoffset:-14}}
@keyframes flowGlow{0%,100%{opacity:.35}50%{opacity:1}}
@keyframes underlineGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes sparkle{0%,100%{transform:rotate(45deg) scale(1);opacity:1}50%{transform:rotate(45deg) scale(.72);opacity:.6}}
@keyframes checkIn{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:scale(1)}}

/* RESPONSIVE-ZOOM */
.dv-card { zoom: 0.818; }
@media (max-width: 800px) {
  body { padding: 18px 10px; }
  .dv-card { zoom: 0.591; }
}
@media (max-width: 400px) {
  body { padding: 10px 6px; }
  .dv-card { zoom: 0.227; }
}
</style>
</head>
<body>
<div class="dv-card" style="width:1100px;padding:40px;background:#fbfaf8">
<div style="text-align:center;max-width:620px;margin:0 auto 14px;background:#fff;border:1px solid #e1dfdd;border-radius:12px;padding:22px 30px">
<div style="font-size:11px;font-weight:650;letter-spacing:.1em;color:#8a8886;margin-bottom:8px">OBJECTIVE</div>
<div style="font-size:17px;font-weight:650;color:#242424;line-height:1.4">Make customer feedback a measurable driver of product decisions</div>
</div>
<div style="display:flex;justify-content:center"><div style="width:2px;height:22px;background:#d2d0ce"></div></div>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:0">
<div style="background:#fff;border:1px solid #e1dfdd;border-radius:12px;padding:24px;text-align:center">
<svg height="104" style="margin:0 auto" viewbox="0 0 104 104" width="104">
<circle cx="52" cy="52" fill="none" r="42" stroke="#edebe9" stroke-width="9"></circle>
<circle cx="52" cy="52" fill="none" r="42" stroke="#0f6cbd" stroke-dasharray="264" stroke-dashoffset="264" stroke-linecap="round" stroke-width="9" style="--off:21;animation:ringFill 1.4s ease-out both .2s" transform="rotate(-90 52 52)"></circle>
<text fill="#242424" font-size="19" font-weight="650" text-anchor="middle" x="52" y="58">92%</text>
</svg>
<div style="font-size:13px;font-weight:650;color:#242424;margin-top:12px;line-height:1.4">Insights triaged within 48 h</div>
<div style="font-size:11px;font-weight:600;color:#4c43b3;background:#efedfc;border-radius:10px;padding:3px 11px;display:inline-block;margin-top:10px">via Skills 1–2</div>
</div>
<div style="background:#fff;border:1px solid #e1dfdd;border-radius:12px;padding:24px;text-align:center">
<svg height="104" style="margin:0 auto" viewbox="0 0 104 104" width="104">
<circle cx="52" cy="52" fill="none" r="42" stroke="#edebe9" stroke-width="9"></circle>
<circle cx="52" cy="52" fill="none" r="42" stroke="#0f6cbd" stroke-dasharray="264" stroke-dashoffset="264" stroke-linecap="round" stroke-width="9" style="--off:58;animation:ringFill 1.4s ease-out both .4s" transform="rotate(-90 52 52)"></circle>
<text fill="#242424" font-size="19" font-weight="650" text-anchor="middle" x="52" y="58">78%</text>
</svg>
<div style="font-size:13px;font-weight:650;color:#242424;margin-top:12px;line-height:1.4">Accepted insights converted to ADO</div>
<div style="font-size:11px;font-weight:600;color:#4c43b3;background:#efedfc;border-radius:10px;padding:3px 11px;display:inline-block;margin-top:10px">via Skills 3–4</div>
</div>
<div style="background:#fff;border:1px solid #e1dfdd;border-radius:12px;padding:24px;text-align:center">
<svg height="104" style="margin:0 auto" viewbox="0 0 104 104" width="104">
<circle cx="52" cy="52" fill="none" r="42" stroke="#edebe9" stroke-width="9"></circle>
<circle cx="52" cy="52" fill="none" r="42" stroke="#e8a262" stroke-dasharray="264" stroke-dashoffset="264" stroke-linecap="round" stroke-width="9" style="--off:137;animation:ringFill 1.4s ease-out both .6s" transform="rotate(-90 52 52)"></circle>
<text fill="#242424" font-size="19" font-weight="650" text-anchor="middle" x="52" y="58">48%</text>
</svg>
<div style="font-size:13px;font-weight:650;color:#242424;margin-top:12px;line-height:1.4">Shipped features traced to insights</div>
<div style="font-size:11px;font-weight:600;color:#4c43b3;background:#efedfc;border-radius:10px;padding:3px 11px;display:inline-block;margin-top:10px">via Skill 5</div>
</div>
</div>
</div>
<script>
  document.querySelectorAll('[data-hover]').forEach(function(el){
    var base = el.getAttribute('style') || '';
    var hover = el.getAttribute('data-hover');
    el.addEventListener('mouseenter', function(){ el.setAttribute('style', base + ';' + hover); });
    el.addEventListener('mouseleave', function(){ el.setAttribute('style', base); });
  });
</script>
</body>
</html>
